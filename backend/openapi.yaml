components:
  schemas:
    AiIdProfile:
      type: object
      required: [ai_id, risk_level, risk_score, on_time_payment_rate, total_rent_facilitated, total_rent_requests, funded_requests, estimated_borrowing_limit, referral_count, member_since, can_lend]
      properties:
        ai_id: { type: string, example: "WEL-A3F2B1" }
        risk_level: { type: string, enum: [Excellent, Good, Standard, Caution, High Risk, New Member] }
        risk_score: { type: number, example: 85 }
        on_time_payment_rate: { type: number, example: 92.5 }
        total_rent_facilitated: { type: number, example: 1500000 }
        total_rent_requests: { type: integer, example: 3 }
        funded_requests: { type: integer, example: 3 }
        estimated_borrowing_limit: { type: number, example: 500000 }
        wallet_balance: { type: number, nullable: true, example: 15000 }
        referral_count: { type: integer, example: 5 }
        member_since: { type: string, format: date-time }
        can_lend: { type: boolean, example: true }
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    InternalError:
      description: Unexpected internal server error
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

