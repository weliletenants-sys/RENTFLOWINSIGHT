<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="color-scheme" content="light dark" />
    <title>Welile.com - Africa's Rent Facilitation Platform</title>
    <meta name="description" content="Welile.com - Africa's leading rent facilitation platform. Access rent today, pay back over time." />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    
    <!-- Critical: Preconnect early — full TCP+TLS handshake saved -->
    <link rel="preload" href="/src/main.tsx" as="script" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://wirntoujqoyjobfhyelc.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://api.exchangerate-api.com">
    
    <!-- Fonts - Skip on save-data / slow connections -->
    <link id="gfonts" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap&subset=latin" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap&subset=latin" rel="stylesheet"></noscript>
    <script>try{var c=navigator.connection;if(c&&(c.saveData||c.effectiveType==='2g'||c.effectiveType==='slow-2g')){var f=document.getElementById('gfonts');if(f)f.remove()}}catch(e){}</script>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#5b21b6" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Welile.com" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />
    
    <!-- Android / Samsung / Transsion / Xiaomi PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="320" />
    
    <!-- KaiOS & Feature phones -->
    <meta name="full-screen" content="yes" />
    <meta name="browsermode" content="application" />

    <!-- Network awareness -->
    <meta http-equiv="Accept-CH" content="DPR, Width, Viewport-Width, Downlink, ECT, Save-Data" />

    <!-- Open Graph -->
    <meta property="og:title" content="Welile.com - Rent Facilitation" />
    <meta property="og:description" content="Access rent today, pay back over time." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://welilereceipts.com/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Minimal critical CSS -->
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html{font-family:'Plus Jakarta Sans',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f8fafc;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;text-size-adjust:100%}
      body{min-height:100vh;min-height:100dvh;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
      #root{min-height:100vh;min-height:100dvh}
      @media(prefers-color-scheme:dark){html{background:#0f172a}}
      /* Reduce motion for low-end devices */
      @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;scroll-behavior:auto!important}}
      /* Data saver mode */
      @media(prefers-reduced-data:reduce){img[save-data-hidden],video,.decorative{display:none!important}}
      
      /* App Shell Skeleton CSS */
      @keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
      @media(prefers-color-scheme:dark){
        .app-shell-skeleton{background:#0f172a!important}
        .app-shell-skeleton div[style*="e2e8f0"]{background:#1e293b!important;border-color:#334155!important}
        .app-shell-skeleton div[style*="ffffff"]{background:#0f172a!important;border-color:#1e293b!important;border-bottom-color:#334155!important}
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-shell-skeleton" style="min-height:100vh;display:flex;flex-direction:column;background:#f8fafc;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased">
        <div style="height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #e2e8f0;background:#ffffff">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;border-radius:12px;background:#e2e8f0;animation:p 1.5s infinite"></div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <div style="width:120px;height:12px;border-radius:6px;background:#e2e8f0;animation:p 1.5s infinite"></div>
              <div style="width:80px;height:8px;border-radius:4px;background:#e2e8f0;animation:p 1.5s infinite"></div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <div style="width:32px;height:32px;border-radius:50%;background:#e2e8f0;animation:p 1.5s infinite"></div>
            <div style="width:32px;height:32px;border-radius:50%;background:#e2e8f0;animation:p 1.5s infinite"></div>
          </div>
        </div>
        <div style="padding:20px 16px;flex:1;display:flex;flex-direction:column;gap:16px;max-width:32rem;margin:0 auto;width:100%">
          <div style="width:100%;height:140px;border-radius:24px;background:#e2e8f0;animation:p 1.5s infinite"></div>
          <div style="display:flex;gap:12px;margin-top:10px">
            <div style="height:80px;flex:1;border-radius:16px;background:#e2e8f0;animation:p 1.5s infinite"></div>
            <div style="height:80px;flex:1;border-radius:16px;background:#e2e8f0;animation:p 1.5s infinite"></div>
          </div>
          <div style="width:100%;height:60px;margin-top:20px;border-radius:12px;background:#e2e8f0;animation:p 1.5s infinite"></div>
          <div style="width:100%;height:60px;border-radius:12px;background:#e2e8f0;animation:p 1.5s infinite"></div>
          <div style="width:100%;height:60px;border-radius:12px;background:#e2e8f0;animation:p 1.5s infinite"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
