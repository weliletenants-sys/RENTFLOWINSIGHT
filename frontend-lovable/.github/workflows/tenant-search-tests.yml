name: Tenant Search Tests

# Runs the pure-logic unit tests for the agent tenant picker on every push
# and pull request. This job is intended to be marked as a REQUIRED status
# check in the repo's branch protection rules so a failing test blocks
# merges into the protected branch.
#
# Scope is intentionally narrow — we only run `src/lib/tenantSearch.test.ts`
# (62 tests, ~30ms) so the gate stays fast and signal-rich. Broader test
# suites can be added as separate jobs without slowing this gate down.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel superseded runs on the same ref so a rapid push series only
# consumes one slot per branch.
concurrency:
  group: tenant-search-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-search-tests:
    name: tenant-search-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tenantSearch unit tests
        run: bunx vitest run src/lib/tenantSearch.test.ts --reporter=verbose

      - name: Run tenantSearch performance regression test
        # Hard latency budget on a 5,000-tenant list. Fails the build if a
        # change causes search ranking to regress past 50ms p50 / 100ms p99.
        run: bunx vitest run src/lib/tenantSearch.perf.test.ts --reporter=verbose