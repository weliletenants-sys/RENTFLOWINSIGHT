version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: welile-local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weliledb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: welile-cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:
