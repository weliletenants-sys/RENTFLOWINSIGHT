<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Agent Dashboard - RentPay Fintech</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Header Section -->
<header class="bg-white dark:bg-slate-900 border-b border-primary/10 px-4 py-4 flex items-center justify-between sticky top-0 z-10">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border-2 border-primary/30">
<img class="w-full h-full object-cover" data-alt="Professional portrait of Alex Johnson, Agent" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3EKV6gZQMNhSOe-CxE-hKOr5GwUEcmnaD26uR61CH_blItGphi1wEC9QVqkwW_qjVOR-qQXt-lHojOjUsIpTR7zwVUmgWWLUD0D1XQL_9FgkBACXz1_qJVOOr6Huhxirj75VjR9geijJsET15Rcl52B_QvVrObU585Ejh-fV0RIy6_dM8fQ7lZVvFStKUtqKQOJk0vYXfdSjSZ4Y4Hmp9fhr5lgwnLid3p-M-E4l9rDwmQgG5o1zVtwglXxQ-9btrmIqDiyoTjiU" style="">
</div>
<div>
<h1 class="text-base font-bold leading-tight" style="">Alex Johnson</h1>
<p class="text-[10px] font-bold tracking-widest text-primary uppercase" style="">AGENT</p>
</div>
</div>
<button class="size-10 flex items-center justify-center rounded-lg hover:bg-primary/10 text-slate-600 dark:text-slate-400" style="">
<span class="material-symbols-outlined" style="">notifications</span>
</button>
</header>
<main class="flex-1 pb-24">
<!-- Wallet Section -->
<section class="p-4 @container">
<div class="relative overflow-hidden bg-primary rounded-xl p-6 text-white shadow-lg shadow-primary/20">
<!-- Abstract Background Pattern -->
<div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
<div class="absolute bottom-0 left-0 w-24 h-24 bg-black/10 rounded-full -ml-12 -mb-12 blur-xl"></div>
<div class="relative z-10">
<p class="text-primary-100/80 text-sm font-medium" style="">Available Commission</p>
<div class="flex items-center justify-between mt-1">
<h2 class="text-3xl font-bold" style="">UGX 12,000</h2>
</div>
</div>
<!-- Action Buttons Grid -->
<div class="grid grid-cols-3 gap-3 mt-6 relative z-10">
<button class="flex flex-col items-center justify-center gap-2 py-3 bg-white/15 hover:bg-white/25 rounded-lg transition-colors" style="">
<span class="material-symbols-outlined text-xl" style="">add_circle</span>
<span class="text-xs font-medium" style="">Deposit</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 py-3 bg-white/15 hover:bg-white/25 rounded-lg transition-colors" style="">
<span class="material-symbols-outlined text-xl" style="">arrow_downward</span>
<span class="text-xs font-medium" style="">Withdraw</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 py-3 bg-white/15 hover:bg-white/25 rounded-lg transition-colors" style="">
<span class="material-symbols-outlined text-xl" style="">swap_horiz</span>
<span class="text-xs font-medium" style="">Transfer</span>
</button>
</div>
</div>
</section>
<!-- Recruitment Progress Section -->
<section class="px-4 py-2">
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-primary/5 shadow-sm">
<div class="flex justify-between items-end mb-4">
<div>
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400" style="">Client Recruitment</h3>
<p class="text-lg font-bold" style="">Payment Conversion</p>
</div>
<p class="text-primary font-bold" style="">64%</p>
</div>
<div class="w-full bg-primary/10 h-3 rounded-full overflow-hidden mb-6">
<div class="bg-primary h-full rounded-full" style="width: 64%"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg border border-primary/5">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium" style="">Total Clients</p>
<p class="text-xl font-bold mt-1 text-primary" style="">128</p>
</div>
<div class="bg-background-light dark:bg-slate-800 p-4 rounded-lg border border-primary/5">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium" style="">Pending Payments</p>
<p class="text-xl font-bold mt-1 text-slate-900 dark:text-slate-100" style="">36</p>
</div>
</div>
</div>
</section>
<!-- Agent Tools Section -->
<section class="px-4 py-6">
<h3 class="text-lg font-bold mb-4 px-1" style="">Agent Tools</h3>
<div class="grid grid-cols-2 gap-4">
<a class="flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-900 rounded-xl border border-primary/5 shadow-sm hover:border-primary/30 transition-all group" href="#" style="">
<div class="size-12 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="">person_add</span>
</div>
<span class="text-sm font-semibold" style="">New Client</span>
</a>
<a class="flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-900 rounded-xl border border-primary/5 shadow-sm hover:border-primary/30 transition-all group" href="#" style="">
<div class="size-12 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="">receipt_long</span>
</div>
<span class="text-sm font-semibold" style="">Invoices</span>
</a>
<a class="flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-900 rounded-xl border border-primary/5 shadow-sm hover:border-primary/30 transition-all group" href="#" style="">
<div class="size-12 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="">analytics</span>
</div>
<span class="text-sm font-semibold" style="">Reports</span>
</a>
<a class="flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-900 rounded-xl border border-primary/5 shadow-sm hover:border-primary/30 transition-all group" href="#" style="">
<div class="size-12 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="">help_center</span>
</div>
<span class="text-sm font-semibold" style="">Support</span>
</a>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-primary/10 px-4 pb-6 pt-2 flex justify-between items-center z-20">
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">home</span>
<span class="text-[10px] font-bold" style="">Home</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">group</span>
<span class="text-[10px] font-medium" style="">Clients</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">payments</span>
<span class="text-[10px] font-medium" style="">Earnings</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#" style="">
<span class="material-symbols-outlined" style="">settings</span>
<span class="text-[10px] font-medium" style="">Settings</span>
</a>
</nav>
</body></html>
